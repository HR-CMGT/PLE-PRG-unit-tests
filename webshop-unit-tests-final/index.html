<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Webshop</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="container">
            <h1>TechStore</h1>
            <div class="cart-icon">
                🛒 <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <main class="container main-content">
        <section class="products">
            <h2>Producten</h2>
            <div class="product-grid" id="product-list">
                <!-- Products injected by JS -->
            </div>
        </section>

        <aside class="cart-sidebar">
            <h2>Winkelmandje</h2>
            <div id="cart-items" class="cart-items">
                <!-- Cart items injected by JS -->
                <p class="empty-cart-msg">Je winkelmandje is leeg.</p>
            </div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotaal:</span>
                    <span id="subtotal">€0,00</span>
                </div>
                <div class="summary-row discount-row" id="discount-row" style="display: none;">
                    <span>Korting (<span id="discount-label"></span>):</span>
                    <span id="discount-amount">-€0,00</span>
                </div>
                <div class="summary-row total">
                    <span>Totaal:</span>
                    <span id="total">€0,00</span>
                </div>

                <div class="discount-section">
                    <div class="discount-input-group">
                        <input type="text" id="discount-code" placeholder="Kortingscode invoeren">
                        <button id="apply-discount-btn">Toepassen</button>
                    </div>
                    <p id="discount-message" class="discount-message"></p>
                </div>

                <button class="checkout-btn">Afrekenen</button>
            </div>
        </aside>
    </main>

    <!-- Templates -->
    <template id="product-card-template">
        <div class="product-card">
            <div class="product-image"></div>
            <h3 class="product-title"></h3>
            <div class="product-price"></div>
            <button class="add-to-cart-btn">In winkelmandje</button>
        </div>
    </template>

    <template id="cart-item-template">
        <div class="cart-item">
            <div class="cart-item-info">
                <div class="cart-item-title"></div>
                <div class="cart-item-price"></div>
            </div>
            <div class="cart-item-controls">
                <button class="qty-btn minus-btn">-</button>
                <span class="cart-item-qty"></span>
                <button class="qty-btn plus-btn">+</button>
            </div>
        </div>
    </template>

    <script type="module" src="./js/app.js"></script>
</body>

</html>
